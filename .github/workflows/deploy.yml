name: Деплой на GitHub Pages

# Собирает статику и публикует на GitHub Pages.
# Запускается при пуше в main (в т.ч. после автообновления данных) и вручную.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Параллельные деплои не нужны — не отменяем уже идущий.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Настроить Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Включить Pages автоматически при первом запуске (нужен source = Actions).
          enablement: true

      - run: npm ci

      - name: Сборка статики
        run: npm run build
        env:
          # На project-page сайт под подпутём /<repo> — берём его из настроек Pages.
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          # Тот же подпуть для ручного префикса путей к картинкам (см. assetPath).
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Публикация
        id: deployment
        uses: actions/deploy-pages@v4
